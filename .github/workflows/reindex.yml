name: Weekly Knowledge Base Refresh

on:
  schedule:
    # Every Sunday at 02:00 GST (UTC+4) = 22:00 UTC Saturday
    - cron: '0 22 * * 6'
  workflow_dispatch:           # Allow manual trigger from GitHub UI
    inputs:
      force_full_reindex:
        description: 'Force full re-index (re-embed all documents)'
        required: false
        default: 'false'
        type: boolean

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip -r requirements.txt

      - name: Scrape library web pages
        continue-on-error: true
        run: |
          if [ -f "urls.txt" ]; then
            echo "Scraping URLs from urls.txt..."
            mkdir -p documents/web
            python scripts/scrape.py --urls urls.txt --output documents/web/ --verbose || \
              echo "Scraping encountered errors — continuing."
          else
            echo "No urls.txt found — skipping web scrape step."
          fi

      - name: Ingest all documents
        run: |
          mkdir -p documents chunks
          if [ -z "$(find documents -type f 2>/dev/null)" ]; then
            echo "No documents found in documents/ — skipping ingest."
            exit 0
          fi
          echo "Ingesting documents..."
          python scripts/ingest.py --source documents/ --output chunks/ --verbose

      - name: Embed and upsert to Pinecone
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_HOST: ${{ secrets.PINECONE_INDEX_HOST }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "OPENAI_API_KEY not set — skipping embed step."
            echo "Add it in: Settings → Secrets and variables → Actions"
            exit 0
          fi
          LATEST=$(ls -t chunks/*.jsonl 2>/dev/null | head -1)
          if [ -z "$LATEST" ]; then
            echo "No chunk files found — skipping embed step."
            exit 0
          fi
          echo "Embedding and uploading: $LATEST"
          python scripts/embed.py --input "$LATEST" --verbose

      - name: Commit updated metadata
        continue-on-error: true
        run: |
          git config user.name  "HCT Library Bot"
          git config user.email "library@hct.ac.ae"
          git add knowledge_base/manifest.json || true
          git diff --staged --quiet || \
            git commit -m "chore: weekly KB refresh [skip ci]"
          git push || echo "Nothing to push."

      - name: Summary
        run: |
          echo "========================================"
          echo "Knowledge base refresh complete"
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M UTC")"
          CHUNK_COUNT=$(cat chunks/*.jsonl 2>/dev/null | wc -l || echo 0)
          echo "Chunks indexed: $CHUNK_COUNT"
          echo "========================================"
