name: Weekly Knowledge Base Refresh

on:
  schedule:
    # Every Sunday at 02:00 GST (UTC+4) = 22:00 UTC Saturday
    - cron: '0 22 * * 6'
  workflow_dispatch:           # Allow manual trigger from GitHub UI
    inputs:
      force_full_reindex:
        description: 'Force full re-index (re-embed all documents)'
        required: false
        default: 'false'
        type: boolean

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install --upgrade pip -r requirements.txt

      - name: Scrape library web pages
        env:
          # Add your library URLs to urls.txt (committed to repo)
          SCRAPE_URLS_FILE: urls.txt
        run: |
          if [ -f "$SCRAPE_URLS_FILE" ]; then
            echo "Scraping URLs from $SCRAPE_URLS_FILE..."
            python scripts/scrape.py --urls "$SCRAPE_URLS_FILE" \
              --output documents/web/ --verbose
          else
            echo "No urls.txt found — skipping web scrape step."
            echo "Create urls.txt with one URL per line to enable automatic scraping."
          fi

      - name: Ingest all documents
        run: |
          echo "Ingesting documents from documents/ directory..."
          python scripts/ingest.py \
            --source documents/ \
            --output chunks/ \
            --verbose

      - name: Embed and upsert to Pinecone
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
          PINECONE_INDEX_HOST: ${{ secrets.PINECONE_INDEX_HOST }}
        run: |
          # Find the latest chunks file
          LATEST=$(ls -t chunks/*.jsonl | head -1)
          if [ -z "$LATEST" ]; then
            echo "No chunk files found — nothing to embed."
            exit 0
          fi
          echo "Embedding and uploading: $LATEST"
          python scripts/embed.py --input "$LATEST" --verbose

      - name: Commit updated chunks metadata
        run: |
          git config user.name  "HCT Library Bot"
          git config user.email "library@hct.ac.ae"
          # Only commit the manifest, not the large chunk files
          git add knowledge_base/manifest.json || true
          git diff --staged --quiet || \
            git commit -m "chore: weekly KB refresh [skip ci]"
          git push || echo "Nothing to push."

      - name: Summary
        run: |
          echo "Knowledge base refresh complete."
          echo "Timestamp: $(date -u +"%Y-%m-%d %H:%M UTC")"
          CHUNK_COUNT=$(cat chunks/*.jsonl 2>/dev/null | wc -l || echo 0)
          echo "Total chunks indexed: $CHUNK_COUNT"
